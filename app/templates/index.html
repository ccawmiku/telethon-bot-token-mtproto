<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Telethon Media Bot</title>
    <style>
      :root {
        --bg: #f7f8fa;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #667085;
        --line: #d9dee7;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --danger: #b42318;
        --ok: #15803d;
        --warn: #a16207;
        --shadow: 0 12px 28px rgba(18, 27, 38, 0.08);
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .bar {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        min-height: 68px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.2;
        font-weight: 700;
        letter-spacing: 0;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 22px auto 40px;
        display: grid;
        gap: 18px;
      }

      .status-row {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .panel, .metric {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .metric {
        min-height: 92px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0;
      }

      .value {
        font-size: 22px;
        font-weight: 750;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .grid {
        display: grid;
        grid-template-columns: 390px minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .panel h2 {
        margin: 0;
        padding: 18px 18px 0;
        font-size: 16px;
        letter-spacing: 0;
      }

      form {
        display: grid;
        gap: 12px;
        padding: 16px 18px 18px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 650;
      }

      input {
        width: 100%;
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 10px;
        font: inherit;
        background: #fff;
        color: var(--text);
      }

      input:focus {
        outline: 2px solid rgba(15, 118, 110, 0.18);
        border-color: var(--accent);
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 13px;
        font: inherit;
        font-weight: 700;
        background: #fff;
        color: var(--text);
        cursor: pointer;
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: white;
      }

      button.primary:hover { background: var(--accent-strong); }
      button.danger { color: var(--danger); }
      button:disabled { opacity: 0.55; cursor: not-allowed; }

      .tabs {
        display: flex;
        gap: 6px;
        border-bottom: 1px solid var(--line);
        padding: 12px 12px 0;
      }

      .tab {
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
        border-bottom-color: transparent;
      }

      .tab.active {
        color: var(--accent);
        border-color: var(--line);
        border-bottom-color: var(--panel);
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 720px;
      }

      th, td {
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: middle;
        font-size: 14px;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border-radius: 999px;
        padding: 0 9px;
        font-size: 12px;
        font-weight: 750;
        background: #eef2f6;
        color: #344054;
      }

      .badge.complete { background: #dcfce7; color: var(--ok); }
      .badge.downloading, .badge.queued { background: #fef3c7; color: var(--warn); }
      .badge.failed { background: #fee4e2; color: var(--danger); }
      .badge.running { background: #ccfbf1; color: var(--accent-strong); }

      .progress {
        width: 120px;
        height: 8px;
        background: #e5e7eb;
        border-radius: 999px;
        overflow: hidden;
      }

      .progress div {
        height: 100%;
        background: var(--accent);
      }

      .hidden { display: none; }
      .muted { color: var(--muted); }
      .file-name {
        max-width: 280px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      @media (max-width: 920px) {
        .status-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .grid { grid-template-columns: 1fr; }
      }

      @media (max-width: 560px) {
        .bar { align-items: flex-start; flex-direction: column; padding: 16px 0; }
        .status-row { grid-template-columns: 1fr; }
        main, .bar { width: min(100% - 20px, 1180px); }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="bar">
        <h1>Telethon Media Bot</h1>
        <div class="actions">
          <button id="startBtn" class="primary">Start</button>
          <button id="restartBtn">Restart</button>
          <button id="stopBtn" class="danger">Stop</button>
        </div>
      </div>
    </header>

    <main>
      <section class="status-row">
        <div class="metric">
          <div class="label">Bot</div>
          <div id="botStatus" class="value">Loading</div>
        </div>
        <div class="metric">
          <div class="label">Username</div>
          <div id="botUser" class="value muted">-</div>
        </div>
        <div class="metric">
          <div class="label">Downloads</div>
          <div id="downloadCount" class="value">0</div>
        </div>
        <div class="metric">
          <div class="label">Files</div>
          <div id="fileCount" class="value">0</div>
        </div>
      </section>

      <section class="grid">
        <div class="panel">
          <h2>Settings</h2>
          <form id="settingsForm">
            <label class="field">
              <span>API ID</span>
              <input id="apiId" name="api_id" inputmode="numeric" autocomplete="off" />
            </label>
            <label class="field">
              <span>API Hash</span>
              <input id="apiHash" name="api_hash" autocomplete="off" placeholder="Leave blank to keep saved value" />
            </label>
            <label class="field">
              <span>Bot Token</span>
              <input id="botToken" name="bot_token" autocomplete="off" placeholder="Leave blank to keep saved value" />
            </label>
            <label class="field">
              <span>Download Directory</span>
              <input id="downloadDir" name="download_dir" />
            </label>
            <label class="field">
              <span>Session Directory</span>
              <input id="sessionDir" name="session_dir" />
            </label>
            <label class="field">
              <span>Progress Interval Seconds</span>
              <input id="progressInterval" name="progress_interval_seconds" type="number" min="1" step="1" />
            </label>
            <label class="field">
              <span>Progress Percent Step</span>
              <input id="progressStep" name="progress_percent_step" type="number" min="1" max="100" step="1" />
            </label>
            <div class="actions">
              <button class="primary" type="submit">Save Settings</button>
            </div>
            <div id="formMessage" class="muted"></div>
          </form>
        </div>

        <div class="panel">
          <div class="tabs">
            <button class="tab active" data-tab="downloads" type="button">Downloads</button>
            <button class="tab" data-tab="files" type="button">Files</button>
          </div>

          <div id="downloadsTab" class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Status</th>
                  <th>File</th>
                  <th>Progress</th>
                  <th>Size</th>
                  <th>Updated</th>
                </tr>
              </thead>
              <tbody id="downloadsBody"></tbody>
            </table>
          </div>

          <div id="filesTab" class="table-wrap hidden">
            <table>
              <thead>
                <tr>
                  <th>File</th>
                  <th>Size</th>
                  <th>Modified</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="filesBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <script>
      const els = {
        botStatus: document.querySelector("#botStatus"),
        botUser: document.querySelector("#botUser"),
        downloadCount: document.querySelector("#downloadCount"),
        fileCount: document.querySelector("#fileCount"),
        downloadsBody: document.querySelector("#downloadsBody"),
        filesBody: document.querySelector("#filesBody"),
        form: document.querySelector("#settingsForm"),
        formMessage: document.querySelector("#formMessage"),
        startBtn: document.querySelector("#startBtn"),
        restartBtn: document.querySelector("#restartBtn"),
        stopBtn: document.querySelector("#stopBtn"),
        apiId: document.querySelector("#apiId"),
        apiHash: document.querySelector("#apiHash"),
        botToken: document.querySelector("#botToken"),
        downloadDir: document.querySelector("#downloadDir"),
        sessionDir: document.querySelector("#sessionDir"),
        progressInterval: document.querySelector("#progressInterval"),
        progressStep: document.querySelector("#progressStep")
      };

      let firstLoad = true;

      function formatBytes(value) {
        if (!value) return "0 B";
        const units = ["B", "KB", "MB", "GB", "TB"];
        let size = Number(value);
        let index = 0;
        while (size >= 1024 && index < units.length - 1) {
          size /= 1024;
          index += 1;
        }
        return index === 0 ? `${size} B` : `${size.toFixed(1)} ${units[index]}`;
      }

      function formatTime(value) {
        if (!value) return "-";
        if (typeof value === "number") return new Date(value * 1000).toLocaleString();
        return new Date(value).toLocaleString();
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      async function postJson(url, payload = {}) {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.detail || response.statusText);
        }
        return response.json();
      }

      function fillSettings(settings) {
        if (!firstLoad) return;
        els.apiId.value = settings.api_id || "";
        els.downloadDir.value = settings.download_dir || "/downloads";
        els.sessionDir.value = settings.session_dir || "/sessions";
        els.progressInterval.value = settings.progress_interval_seconds || 3;
        els.progressStep.value = settings.progress_percent_step || 10;
        if (settings.api_hash_set) els.apiHash.placeholder = "Saved. Leave blank to keep value";
        if (settings.bot_token_set) els.botToken.placeholder = "Saved. Leave blank to keep value";
      }

      function renderDownloads(downloads) {
        els.downloadsBody.innerHTML = downloads.map((item) => `
          <tr>
            <td><span class="badge ${escapeHtml(item.status)}">${escapeHtml(item.status)}</span></td>
            <td><div class="file-name" title="${escapeHtml(item.file_name)}">${escapeHtml(item.file_name)}</div>${item.error ? `<div class="muted">${escapeHtml(item.error)}</div>` : ""}</td>
            <td><div class="progress"><div style="width:${item.progress || 0}%"></div></div></td>
            <td>${formatBytes(item.size_bytes || item.total_bytes)}</td>
            <td>${formatTime(item.updated_at)}</td>
          </tr>
        `).join("") || `<tr><td colspan="5" class="muted">No downloads yet</td></tr>`;
      }

      function renderFiles(files) {
        els.filesBody.innerHTML = files.map((item) => `
          <tr>
            <td><div class="file-name" title="${escapeHtml(item.name)}">${escapeHtml(item.name)}</div></td>
            <td>${formatBytes(item.size_bytes)}</td>
            <td>${formatTime(item.modified_at)}</td>
            <td><a href="${encodeURI(item.url)}">Download</a></td>
          </tr>
        `).join("") || `<tr><td colspan="4" class="muted">No files yet</td></tr>`;
      }

      async function refresh() {
        const state = await fetch("/api/state").then((res) => res.json());
        const running = state.bot.running;
        els.botStatus.innerHTML = running ? `<span class="badge running">Running</span>` : `<span class="badge">Stopped</span>`;
        els.botUser.textContent = state.bot.username ? `@${state.bot.username}` : "-";
        els.downloadCount.textContent = state.downloads.length;
        els.fileCount.textContent = state.files.length;
        els.startBtn.disabled = running || !state.settings.ready;
        els.restartBtn.disabled = !state.settings.ready;
        els.stopBtn.disabled = !running;
        fillSettings(state.settings);
        renderDownloads(state.downloads);
        renderFiles(state.files);
        if (state.bot.last_error) els.formMessage.textContent = state.bot.last_error;
        firstLoad = false;
      }

      els.form.addEventListener("submit", async (event) => {
        event.preventDefault();
        els.formMessage.textContent = "Saving...";
        const payload = {
          api_id: els.apiId.value.trim() || null,
          api_hash: els.apiHash.value.trim(),
          bot_token: els.botToken.value.trim(),
          download_dir: els.downloadDir.value.trim() || "/downloads",
          session_dir: els.sessionDir.value.trim() || "/sessions",
          progress_interval_seconds: Number(els.progressInterval.value || 3),
          progress_percent_step: Number(els.progressStep.value || 10)
        };
        try {
          await postJson("/api/settings", payload);
          els.apiHash.value = "";
          els.botToken.value = "";
          firstLoad = true;
          els.formMessage.textContent = "Saved";
          await refresh();
        } catch (error) {
          els.formMessage.textContent = error.message;
        }
      });

      els.startBtn.addEventListener("click", async () => {
        els.formMessage.textContent = "Starting...";
        try {
          await postJson("/api/bot/start");
          els.formMessage.textContent = "Started";
          await refresh();
        } catch (error) {
          els.formMessage.textContent = error.message;
        }
      });

      els.restartBtn.addEventListener("click", async () => {
        els.formMessage.textContent = "Restarting...";
        try {
          await postJson("/api/bot/restart");
          els.formMessage.textContent = "Restarted";
          await refresh();
        } catch (error) {
          els.formMessage.textContent = error.message;
        }
      });

      els.stopBtn.addEventListener("click", async () => {
        els.formMessage.textContent = "Stopping...";
        await postJson("/api/bot/stop");
        els.formMessage.textContent = "Stopped";
        await refresh();
      });

      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach((item) => item.classList.remove("active"));
          tab.classList.add("active");
          const target = tab.dataset.tab;
          document.querySelector("#downloadsTab").classList.toggle("hidden", target !== "downloads");
          document.querySelector("#filesTab").classList.toggle("hidden", target !== "files");
        });
      });

      refresh();
      setInterval(refresh, 3000);
    </script>
  </body>
</html>
